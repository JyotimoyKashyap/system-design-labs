name: PR Docker Build Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Docker Build
        run: |
          echo "Testing multi-stage Docker build to ensure Vite apps compile successfully..."
          docker build -t test-build-image .
          echo "Build successful! The PR is safe to merge."
