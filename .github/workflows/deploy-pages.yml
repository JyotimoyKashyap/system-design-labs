name: Deploy Mono-Repo to GitHub Pages & GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and GHCR
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write  # Required to push to GitHub Container Registry

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build, Push, and Extract Static Hub
        run: |
          # Convert repository name to lowercase for Docker tag compatibility
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_NAME"
          
          echo "Building Docker Image: $IMAGE_NAME..."
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
          
          echo "Pushing Docker Image to GHCR..."
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
          
          echo "Extracting compiled static assets for GitHub Pages deployment..."
          mkdir -p public-pages
          docker create --name extract-container $IMAGE_NAME:latest
          docker cp extract-container:/usr/share/nginx/html/. ./public-pages/
          docker rm extract-container

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
