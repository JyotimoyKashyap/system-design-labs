<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Design Labs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #fdfcfb;
            background-image: 
              linear-gradient(to right, rgba(28, 25, 23, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(28, 25, 23, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #1c1917;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 80px 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-style: italic;
            color: #1c1917;
            margin: 0 0 16px 0;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: #57534e;
            margin-bottom: 60px;
            font-weight: 500;
            max-width: 600px;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        .card {
            background: white;
            border: 3px solid #1c1917;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.15s ease;
            box-shadow: 8px 8px 0px 0px rgba(28,25,23,1);
            position: relative;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px rgba(28,25,23,1);
        }

        .card h2 {
            margin: 0 0 12px 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: #1c1917;
            letter-spacing: -0.01em;
        }

        .card p {
            margin: 0 0 24px 0;
            color: #44403c;
            font-size: 1rem;
            line-height: 1.6;
            flex-grow: 1;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 12px;
            background: #f97316;
            color: white;
            border: 2px solid #1c1917;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
            box-shadow: 2px 2px 0px 0px rgba(28,25,23,1);
            align-self: flex-start;
        }

        .card-actions {
            display: flex;
            gap: 16px;
            margin-top: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border: 3px solid #000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.15s ease;
            box-shadow: 4px 4px 0px 0px #000;
            cursor: pointer;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #000;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn-primary {
            background: #FF6B6B;
            color: #000;
        }

        .btn-secondary {
            background: #4ECDC4;
            color: #000;
        }


    </style>
</head>
<body>

    <div class="container">
        <h1>System Design Labs</h1>
        <p class="subtitle">A collection of interactive distributed systems and algorithm visualizers. Choose a lab below to launch its interactive simulation environment.</p>

        <div class="grid" id="project-grid">
            <!-- Cards will be injected dynamically via data.json -->
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('project-grid');
                data.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let actionsHtml = '';
                    if (project.appLink) {
                        actionsHtml += `<a href="${project.appLink}" class="btn btn-primary">Launch App</a>\n                    `;
                    }
                    if (project.docsLink) {
                        actionsHtml += `<a href="${project.docsLink}" class="btn btn-secondary">Read Docs</a>`;
                    }

                    card.innerHTML = `
                        <span class="tag" style="background: ${project.tagColor}; color: ${project.tagTextColor || '#fff'};">${project.tag}</span>
                        <h2>${project.title}</h2>
                        <p>${project.description}</p>
                        <div class="card-actions">
                            ${actionsHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => console.error('Error loading projects:', error));
    </script>
</body>
</html>
