<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Design Labs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #fdfcfb;
            background-image: 
              linear-gradient(to right, rgba(28, 25, 23, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(28, 25, 23, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #1c1917;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 80px 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-style: italic;
            color: #1c1917;
            margin: 0 0 16px 0;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: #57534e;
            margin-bottom: 60px;
            font-weight: 500;
            max-width: 600px;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        .card {
            background: white;
            border: 3px solid #1c1917;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.15s ease;
            box-shadow: 8px 8px 0px 0px rgba(28,25,23,1);
            position: relative;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px rgba(28,25,23,1);
        }

        .card h2 {
            margin: 0 0 12px 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: #1c1917;
            letter-spacing: -0.01em;
        }

        .card p {
            margin: 0 0 24px 0;
            color: #44403c;
            font-size: 1rem;
            line-height: 1.6;
            flex-grow: 1;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 12px;
            background: #f97316;
            color: white;
            border: 2px solid #1c1917;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
            box-shadow: 2px 2px 0px 0px rgba(28,25,23,1);
            align-self: flex-start;
        }

        .card-actions {
            display: flex;
            gap: 16px;
            margin-top: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border: 3px solid #000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.15s ease;
            box-shadow: 4px 4px 0px 0px #000;
            cursor: pointer;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #000;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn-primary {
            background: #FF6B6B;
            color: #000;
        }

        .btn-secondary {
            background: #4ECDC4;
            color: #000;
        }


    </style>
    
    <!-- Umami Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b899ac21-eb80-40aa-b083-ccc95a14d980"></script>
</head>
<body>

    <a href="https://github.com/JyotimoyKashyap/system-design-labs" target="_blank" class="btn" style="position: absolute; top: 32px; right: 32px; background: #fff; z-index: 100;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 8px;">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
    </a>

    <div class="container">
        <h1>System Design Labs</h1>
        <p class="subtitle">A collection of interactive distributed systems and algorithm visualizers. Choose a lab below to launch its interactive simulation environment.</p>

        <div class="grid" id="project-grid">
            <!-- Cards will be injected dynamically via data.json -->
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('project-grid');
                data.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let actionsHtml = '';
                    if (project.appLink) {
                        actionsHtml += `<a href="${project.appLink}" class="btn btn-primary">Launch App</a>\n                    `;
                    }
                    if (project.docsLink) {
                        actionsHtml += `<a href="${project.docsLink}" class="btn btn-secondary">Read Docs</a>`;
                    }

                    card.innerHTML = `
                        <span class="tag" style="background: ${project.tagColor}; color: ${project.tagTextColor || '#fff'};">${project.tag}</span>
                        <h2>${project.title}</h2>
                        <p>${project.description}</p>
                        <div class="card-actions">
                            ${actionsHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => console.error('Error loading projects:', error));
    </script>
</body>
</html>
